name: Bug Report
description: Report incorrect detection or Dockerfile generation
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: How to reproduce
      description: |
        Minimal project structure that triggers the bug.
        Include relevant files (package.json, go.mod, etc.).
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Docksmith version
      placeholder: "v0.1.0"

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 15, Ubuntu 24.04, etc."
